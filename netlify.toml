[build]
  command = "npm run build"
  publish = "dist"

# Vite assets are content-hashed — safe to cache forever
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Data + reports change at most weekly — serve cached, revalidate in background
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/reports/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# SPA fallback — all routes serve index.html so React Router handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
