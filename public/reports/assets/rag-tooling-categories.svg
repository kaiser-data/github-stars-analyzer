.srf{fill:#1a1a19;stroke:#33332f}.ttl{fill:#ffffff}
.lbl{fill:#c3c2b7}.val{fill:#ffffff}.bar{fill:#3987e5}
}
</style>
<rect x="0.5" y="0.5" width="679" height="179" rx="8" class="srf"/>
<text x="14" y="25" class="ttl">Tools per category</text>
<text x="236" y="49.0" class="lbl" text-anchor="end" dominant-baseline="central">RAG framework / engine</text>
